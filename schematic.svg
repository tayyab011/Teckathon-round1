<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="dot" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="4" markerHeight="4">
      <circle cx="4" cy="4" r="3" fill="#1e293b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="#f8fafc" rx="16"/>
  <text x="500" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Hardware Schematic — One Room (3 Lights + 2 Fans)</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#64748b">ESP32 Microcontroller with Relays and Current Sensing</text>

  <!-- ESP32 MCU -->
  <rect x="360" y="110" width="280" height="120" rx="12" fill="#1e293b" filter="url(#shadow)"/>
  <text x="500" y="148" text-anchor="middle" font-size="16" font-weight="700" fill="#60a5fa">ESP32 Dev Board</text>
  <text x="500" y="170" text-anchor="middle" font-size="12" fill="#94a3b8">3.3V / 5V Microcontroller</text>
  <text x="500" y="190" text-anchor="middle" font-size="11" fill="#64748b">GPIO pins: D18-D22 (relays), D26-D27 (ACS712)</text>
  <text x="500" y="210" text-anchor="middle" font-size="11" fill="#64748b">WiFi + WebSocket to Backend</text>

  <!-- Power Supply -->
  <rect x="800" y="230" width="160" height="60" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="880" y="260" text-anchor="middle" font-size="14" font-weight="600" fill="#92400e">12V Power Supply</text>
  <text x="880" y="278" text-anchor="middle" font-size="11" fill="#92400e">For relays &amp; devices</text>
  <line x1="800" y1="260" x2="640" y2="260" stroke="#d97706" stroke-width="2"/>
  <text x="720" y="252" text-anchor="middle" font-size="10" fill="#d97706">12V</text>

  <!-- 5V Regulator -->
  <rect x="800" y="100" width="160" height="50" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="880" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#3730a3">5V Regulator</text>
  <text x="880" y="138" text-anchor="middle" font-size="11" fill="#3730a3">(AMS1117-5.0)</text>
  <line x1="800" y1="125" x2="640" y2="125" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="720" y="118" text-anchor="middle" font-size="10" fill="#4f46e5">5V → ESP32 VIN</text>

  <!-- Relay Module -->
  <rect x="60" y="100" width="260" height="170" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="190" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">5-Channel Relay Module</text>
  <text x="190" y="138" text-anchor="middle" font-size="11" fill="#166534">(SRD-05VDC-SL-C)</text>

  <!-- Relay labels -->
  <text x="85" y="162" font-size="12" fill="#166534">CH1 (D18) → Light 1</text>
  <text x="85" y="182" font-size="12" fill="#166534">CH2 (D19) → Light 2</text>
  <text x="85" y="202" font-size="12" fill="#166534">CH3 (D20) → Light 3</text>
  <text x="85" y="222" font-size="12" fill="#166534">CH4 (D21) → Fan 1</text>
  <text x="85" y="242" font-size="12" fill="#166534">CH5 (D22) → Fan 2</text>

  <!-- GPIO lines ESP32 → Relay -->
  <line x1="360" y1="150" x2="320" y2="160" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="360" y1="170" x2="320" y2="180" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="360" y1="190" x2="320" y2="200" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="360" y1="200" x2="320" y2="220" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="360" y1="210" x2="320" y2="240" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="340" y="146" font-size="9" fill="#3b82f6">GPIO</text>

  <!-- ====== Light 1 ====== -->
  <circle cx="100" cy="380" r="55" fill="#fef9c3" stroke="#eab308" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="370" text-anchor="middle" font-size="13" font-weight="600" fill="#854d0e">Light 1</text>
  <text x="100" y="390" text-anchor="middle" font-size="12" fill="#854d0e">💡 15W</text>
  <text x="100" y="410" text-anchor="middle" font-size="10" fill="#a16207">AC Bulb</text>
  <line x1="100" y1="325" x2="100" y2="270" stroke="#eab308" stroke-width="1.5"/>
  <line x1="65" y1="345" x2="40" y2="310" stroke="#eab308" stroke-width="1.5"/>
  <text x="75" y="300" font-size="10" fill="#eab308">Relay CH1</text>

  <!-- ====== Light 2 ====== -->
  <circle cx="280" cy="380" r="55" fill="#fef9c3" stroke="#eab308" stroke-width="2" filter="url(#shadow)"/>
  <text x="280" y="370" text-anchor="middle" font-size="13" font-weight="600" fill="#854d0e">Light 2</text>
  <text x="280" y="390" text-anchor="middle" font-size="12" fill="#854d0e">💡 15W</text>
  <text x="280" y="410" text-anchor="middle" font-size="10" fill="#a16207">AC Bulb</text>
  <line x1="280" y1="325" x2="280" y2="300" stroke="#eab308" stroke-width="1.5"/>
  <line x1="255" y1="355" x2="200" y2="320" stroke="#eab308" stroke-width="1.5"/>
  <text x="210" y="310" font-size="10" fill="#eab308">Relay CH2</text>

  <!-- ====== Light 3 ====== -->
  <circle cx="460" cy="380" r="55" fill="#fef9c3" stroke="#eab308" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="370" text-anchor="middle" font-size="13" font-weight="600" fill="#854d0e">Light 3</text>
  <text x="460" y="390" text-anchor="middle" font-size="12" fill="#854d0e">💡 15W</text>
  <text x="460" y="410" text-anchor="middle" font-size="10" fill="#a16207">AC Bulb</text>
  <line x1="460" y1="325" x2="460" y2="300" stroke="#eab308" stroke-width="1.5"/>
  <line x1="435" y1="355" x2="380" y2="320" stroke="#eab308" stroke-width="1.5"/>
  <text x="390" y="310" font-size="10" fill="#eab308">Relay CH3</text>

  <!-- ====== Fan 1 ====== -->
  <rect x="620" y="340" width="100" height="80" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
  <text x="670" y="370" text-anchor="middle" font-size="14" font-weight="600" fill="#0369a1">Fan 1</text>
  <text x="670" y="390" text-anchor="middle" font-size="12" fill="#0369a1">🌀 60W</text>
  <text x="670" y="408" text-anchor="middle" font-size="10" fill="#0369a1">AC Fan</text>
  <line x1="670" y1="340" x2="670" y2="310" stroke="#0284c7" stroke-width="1.5"/>
  <line x1="600" y1="360" x2="560" y2="320" stroke="#0284c7" stroke-width="1.5"/>
  <text x="570" y="310" font-size="10" fill="#0284c7">Relay CH4</text>

  <!-- ====== Fan 2 ====== -->
  <rect x="780" y="340" width="100" height="80" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
  <text x="830" y="370" text-anchor="middle" font-size="14" font-weight="600" fill="#0369a1">Fan 2</text>
  <text x="830" y="390" text-anchor="middle" font-size="12" fill="#0369a1">🌀 60W</text>
  <text x="830" y="408" text-anchor="middle" font-size="10" fill="#0369a1">AC Fan</text>
  <line x1="830" y1="340" x2="830" y2="310" stroke="#0284c7" stroke-width="1.5"/>
  <line x1="760" y1="380" x2="720" y2="320" stroke="#0284c7" stroke-width="1.5"/>
  <text x="725" y="310" font-size="10" fill="#0284c7">Relay CH5</text>

  <!-- ACS712 Current Sensors -->
  <rect x="60" y="500" width="300" height="60" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="210" y="525" text-anchor="middle" font-size="13" font-weight="600" fill="#9d174d">ACS712 Current Sensor (5A)</text>
  <text x="210" y="545" text-anchor="middle" font-size="11" fill="#9d174d">Measures total AC current draw for the room</text>
  <line x1="210" y1="500" x2="210" y2="460" stroke="#db2777" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="220" y="478" font-size="10" fill="#db2777">AC line sensing</text>

  <!-- ACS712 → ESP32 -->
  <line x1="360" y1="530" x2="370" y2="530" stroke="#db2777" stroke-width="1.5"/>
  <line x1="370" y1="530" x2="500" y2="240" stroke="#db2777" stroke-width="1.5"/>
  <text x="440" y="400" font-size="10" fill="#db2777">ADC (D26/D27)</text>

  <!-- Pull-up resistors note -->
  <rect x="60" y="600" width="400" height="55" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="260" y="622" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Pull-up Resistors (10kΩ) on Relay Control Lines</text>
  <text x="260" y="640" text-anchor="middle" font-size="11" fill="#64748b">Ensures relays stay OFF during ESP32 boot / reset</text>

  <!-- Legend -->
  <rect x="600" y="500" width="340" height="120" rx="10" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="770" y="520" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Legend</text>
  <rect x="620" y="532" width="20" height="12" rx="3" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="650" y="543" font-size="11" fill="#475569">Relay Module (5V, active LOW)</text>
  <rect x="620" y="552" width="20" height="12" rx="3" fill="#fce7f3" stroke="#db2777"/>
  <text x="650" y="563" font-size="11" fill="#475569">ACS712 Current Sensor (5A AC/DC)</text>
  <circle cx="630" cy="582" r="6" fill="#fef9c3" stroke="#eab308"/>
  <text x="650" y="586" font-size="11" fill="#475569">AC Bulbs (15W each)</text>
  <rect x="620" y="596" width="20" height="12" rx="3" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="650" y="607" font-size="11" fill="#475569">AC Fans (60W each)</text>
</svg>
