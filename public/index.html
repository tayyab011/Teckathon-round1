<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Office Live Dashboard</title>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --g-bg:rgba(255,255,255,0.055);
      --g-bd:rgba(255,255,255,0.08);
      --g-sh:0 8px 32px rgba(0,0,0,0.35);
      --g-bl:blur(28px);
      --t1:hsla(0,0%,100%,.92);
      --t2:hsla(0,0%,100%,.55);
      --t3:hsla(0,0%,100%,.30);
      --bl:#5e9eff;--cy:#60d0ff;--gr:#34d399;--or:#fb923c;--re:#f87171;--ye:#facc15;
      --bg:#080c18;
      --r1:8px;--r2:14px;--r3:20px;--r4:28px;
      --sw-off:#3a3a46;
      --sw-on:#34d399;
      --sw-knob:#ffffff;
    }
    html{background:var(--bg);overflow-anchor:none;scroll-behavior:auto}
    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;
      -webkit-font-smoothing:antialiased;overflow-anchor:none;overscroll-behavior:none
    }
    .mg{contain:layout}

    .amb{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
    .amb .o{position:absolute;border-radius:50%;filter:blur(90px);opacity:.25;animation:orb 22s ease-in-out infinite alternate}
    .amb .o:nth-child(1){width:520px;height:520px;background:#1d4ed8;top:-12%;left:-6%;animation-duration:26s}
    .amb .o:nth-child(2){width:420px;height:420px;background:#7c3aed;bottom:-10%;right:-6%;animation-duration:21s;animation-delay:-5s}
    .amb .o:nth-child(3){width:320px;height:320px;background:#059669;top:42%;left:42%;animation-duration:19s;animation-delay:-10s;opacity:.12}
    @keyframes orb{
      0%{transform:translate(0,0)scale(1)}
      33%{transform:translate(70px,-44px)scale(1.12)}
      66%{transform:translate(-36px,66px)scale(.88)}
      to{transform:translate(44px,-24px)scale(1.06)}
    }

    .g{background:var(--g-bg);backdrop-filter:var(--g-bl);-webkit-backdrop-filter:var(--g-bl);border:1px solid var(--g-bd);box-shadow:var(--g-sh)}
    .gi{transition:background .3s,border-color .3s,box-shadow .3s}
    .gi:hover{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.16)}

    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:0 0}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:10px}

    .app{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:24px 28px 32px}

    .hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;gap:16px;flex-wrap:wrap}
    .hl{display:flex;align-items:center;gap:16px}
    .bm{width:44px;height:44px;border-radius:var(--r2);background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;box-shadow:0 4px 20px rgba(59,130,246,.3);flex-shrink:0}
    .hl h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
    .hl h1 s{color:var(--t2);font-weight:400;text-decoration:none}
    .hr{display:flex;align-items:center;gap:12px}

    .st{display:flex;align-items:center;gap:8px;padding:8px 18px;border-radius:100px;font-size:12px;color:var(--t2)}
    .st .pd{width:7px;height:7px;border-radius:50%;background:var(--gr);animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,to{opacity:1;box-shadow:0 0 0 0 rgba(52,211,153,.5)}50%{opacity:.7;box-shadow:0 0 0 8px rgba(52,211,153,0)}}

    .pm{display:flex;align-items:center;gap:14px;padding:9px 20px 9px 14px;border-radius:100px}
    .pm .ri{position:relative;width:42px;height:42px;flex-shrink:0}
    .pm .ri svg{transform:rotate(-90deg);width:42px;height:42px}
    .pm .ri .bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:3}
    .pm .ri .fg{fill:none;stroke:var(--cy);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.34,1.56,.64,1)}
    .pm .ri .cd{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px}
    .pm .n{display:flex;flex-direction:column;line-height:1.2}
    .pm .n .v{font-size:19px;font-weight:700;letter-spacing:-.2px}
    .pm .n .l{font-size:10px;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:.6px}

    .mg{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}
    @media(max-width:1024px){.mg{grid-template-columns:1fr}}
    .lc{display:flex;flex-direction:column;gap:24px}

    .sh{display:flex;justify-content:space-between;align-items:center;padding:0 2px}
    .sh h2{font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}

    .fm{width:100%;height:200px;border-radius:var(--r3);overflow:hidden;position:relative}
    .fm::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 15% 30%,rgba(59,130,246,.07) 0%,transparent 50%),radial-gradient(circle at 85% 70%,rgba(139,92,246,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
    .or{position:absolute;border-radius:var(--r2);display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:5px;padding:14px 12px;z-index:1;background:rgba(255,255,255,.035);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.05)}
    .ol{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.09);backdrop-filter:blur(10px);padding:3px 16px;border-radius:100px;font-size:11px;font-weight:700;color:var(--t1);letter-spacing:.2px;white-space:nowrap;z-index:2}
    .rn{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px;pointer-events:none}
    .dd{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .35s;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05)}
    .dd.lo{background:rgba(250,204,21,.22);border-color:rgba(250,204,21,.35);box-shadow:0 0 14px 2px rgba(250,204,21,.12)}
    .dd.fo{background:rgba(94,158,255,.18);border-color:rgba(94,158,255,.3)}
    .dd.os{opacity:.35}

    .rg{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    @media(max-width:1100px){.rg{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:640px){.rg{grid-template-columns:1fr}}
    .rc{border-radius:var(--r3);padding:18px 18px 14px;transition:box-shadow .3s;display:flex;flex-direction:column}
    .rc:hover{box-shadow:0 14px 44px rgba(0,0,0,.4)}
    .rch{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:11px;border-bottom:1px solid rgba(255,255,255,.05)}
    .rch .nm{font-size:15px;font-weight:600}
    .rch .rpb{padding:3px 13px;border-radius:100px;font-size:11px;font-weight:600;background:rgba(94,158,255,.12);color:var(--cy);white-space:nowrap}

    .dl{display:flex;flex-direction:column;flex:1}
    .di{display:grid;grid-template-columns:30px 1fr 54px;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.025)}
    .di:last-child{border-bottom:none}

    .dic{width:30px;height:30px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .35s,box-shadow .35s;background:rgba(255,255,255,.035);flex-shrink:0}
    .dic.fo{background:rgba(94,158,255,.14)}
    .dic.lo{background:rgba(250,204,21,.14);box-shadow:0 0 12px 1px rgba(250,204,21,.08)}
    .dnn{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .dm{display:flex;align-items:center;gap:8px;justify-self:end}
    .fs{animation:spin 1.2s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}

    .rf{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.035);font-size:11px;color:var(--t3)}
    .rf .rs{display:flex;gap:12px}
    .rf .rs s{display:flex;align-items:center;gap:4px;text-decoration:none}
    .rf .rs .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
    .rf .rs .dot.g{background:var(--gr)}
    .rf .rs .dot.r{background:var(--t3)}

    .switch-wrap{display:flex;align-items:center;gap:10px;justify-self:end;user-select:none;-webkit-tap-highlight-color:transparent}
    .sw{
      position:relative;width:44px;height:26px;border-radius:13px;
      background:var(--sw-off);cursor:pointer;
      transition:background .35s cubic-bezier(.4,.0,.2,1),box-shadow .35s;
      flex-shrink:0;
    }
    .sw.on{background:var(--sw-on);box-shadow:0 0 12px rgba(52,211,153,.25)}
    .sw .knob{
      position:absolute;top:3px;left:3px;width:20px;height:20px;
      border-radius:50%;background:var(--sw-knob);
      transition:transform .35s cubic-bezier(.4,.0,.2,1),box-shadow .35s;
      box-shadow:0 2px 6px rgba(0,0,0,.3);
    }
    .sw.on .knob{transform:translateX(18px);box-shadow:0 2px 8px rgba(52,211,153,.3)}
    .sw .glow{
      position:absolute;inset:-2px;border-radius:15px;
      opacity:0;transition:opacity .35s;
      background:radial-gradient(circle at 50% 50%,rgba(52,211,153,.15),transparent 70%);
    }
    .sw.on .glow{opacity:1}

    .bkc{border-radius:var(--r3);padding:18px 20px}
    .bkc h3{font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
    .bw{display:flex;flex-direction:column;gap:9px}
    .br{display:grid;grid-template-columns:100px 1fr 52px;align-items:center;gap:12px}
    .bl{font-size:13px;font-weight:500;color:var(--t2)}
    .bt{height:5px;border-radius:10px;background:rgba(255,255,255,.05);overflow:hidden}
    .bf{height:100%;border-radius:10px;transition:width .6s cubic-bezier(.34,1.56,.64,1);background:linear-gradient(90deg,var(--bl),var(--cy))}
    .bv{font-size:12px;font-weight:600;color:var(--t1);text-align:right;font-variant-numeric:tabular-nums}

    .ap{border-radius:var(--r4);padding:20px;position:sticky;top:24px;max-height:calc(100vh - 100px);overflow-y:auto;contain:layout;overflow-anchor:none}
    .ah{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.05)}
    .ah h3{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--t3)}
    .acb{background:var(--re);color:#fff;font-size:10px;font-weight:700;padding:2px 10px;border-radius:100px;min-width:20px;text-align:center}
    .ai{padding:13px 14px;border-radius:var(--r2);margin-bottom:8px;font-size:12px;line-height:1.45;border-left:3px solid var(--re);background:rgba(248,113,113,.055);transition:opacity .4s,background .4s}
    .ai.r{border-left-color:var(--gr);background:rgba(52,211,153,.035);opacity:.45}
    .ai .ti{font-size:10px;color:var(--t3);margin-top:5px;font-weight:500}
    .ai .tg{display:inline-block;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:1px 7px;border-radius:100px;margin-left:6px}
    .ai .tg.d{background:rgba(248,113,113,.13);color:var(--re)}
    .ai .tg.w{background:rgba(251,191,36,.13);color:var(--ye)}
    .ae{color:var(--t3);font-size:13px;text-align:center;padding:32px 12px;font-weight:500}

    .ft{display:flex;justify-content:flex-end;gap:20px;margin-top:20px;padding-top:14px;border-top:1px solid rgba(255,255,255,.03);font-size:11px;color:var(--t3)}
    .ft s{display:flex;align-items:center;gap:6px;text-decoration:none}
    .ft .kh{color:var(--cy);font-weight:600}

    .rc,.fm{opacity:0}
    .rc.show,.fm.show{animation:fu .5s ease both}
    .rc.show:nth-child(2){animation-delay:45ms}
    .rc.show:nth-child(3){animation-delay:90ms}
    @keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:640px){
      .app{padding:14px}
      .hl h1{font-size:16px}.bm{width:36px;height:36px;font-size:16px}
      .pm{padding:7px 14px 7px 10px}
      .pm .ri{width:32px;height:32px}.pm .ri svg{width:32px;height:32px}
      .pm .n .v{font-size:15px}
      .st{display:none}
      .fm{height:140px}
      .mg{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<div class="amb"><div class="o"></div><div class="o"></div><div class="o"></div></div>

<div class="app">

  <header class="hdr">
    <div class="hl">
      <div class="bm">B</div>
      <h1>Office <s>Monitor</s></h1>
    </div>
    <div class="hr">
      <div class="st g"><span class="pd"></span><span>Live</span></div>
      <div class="pm g">
        <div class="ri">
          <svg viewBox="0 0 42 42"><circle class="bg" cx="21" cy="21" r="17"/><circle class="fg" id="pr" cx="21" cy="21" r="17" stroke-dasharray="106.81" stroke-dashoffset="106.81"/></svg>
          <div class="cd">⚡</div>
        </div>
        <div class="n"><span class="v" id="pv">0 W</span><span class="l" id="kd">0.000 kWh</span></div>
      </div>
    </div>
  </header>

  <div class="mg">
    <div class="lc">

      <div>
        <div class="sh" style="margin-bottom:10px"><h2>Floor Plan</h2></div>
        <div class="fm g" id="om"></div>
      </div>

      <div>
        <div class="sh" style="margin-bottom:10px"><h2>Device Status</h2></div>
        <div class="rg" id="rc"></div>
      </div>

      <div>
        <div class="sh" style="margin-bottom:10px"><h2>Power Breakdown</h2></div>
        <div class="bkc g"><h3>Per-Room Consumption</h3><div class="bw" id="bdc"></div></div>
      </div>

    </div>

    <div class="ap g">
      <div class="ah"><h3>Alerts</h3><span class="acb" id="ac">0</span></div>
      <div id="al"></div>
    </div>
  </div>

  <div class="ft">
    <s id="lu">Last updated: —</s>
    <s class="kh" id="kv">0.000 kWh today</s>
  </div>

</div>

<script>
const socket = io();
const ROOMS = ["Drawing Room", "Work Room 1", "Work Room 2"];
const POS = [
  {l:"5%", t:"16%", w:"28%", h:"68%"},
  {l:"36%", t:"16%", w:"28%", h:"68%"},
  {l:"67%", t:"16%", w:"28%", h:"68%"},
];
const SW = {}, I = {}, D = {}, RB = {};

let roomOnEl = {}, roomOffEl = {};

function short(r) {
  return r.includes("Drawing") ? "Drawing" : r.includes("1") ? "Work 1" : "Work 2";
}

let _sx = 0, _sy = 0;
function snap() { _sx = window.scrollX; _sy = window.scrollY; }
function restore() { requestAnimationFrame(() => { if (window.scrollX !== _sx || window.scrollY !== _sy) window.scrollTo(_sx, _sy); }); }

function toggleDevice(id) {
  snap();
  fetch(`/api/devices/${id}/toggle`, { method: "POST" }).catch(() => {});
}

function buildMap(devices) {
  const om = document.getElementById("om");
  let oh = "";
  ROOMS.forEach((r, i) => {
    const p = POS[i];
    oh += `<div class="or" style="left:${p.l};top:${p.t};width:${p.w};height:${p.h}" data-room="${r}"><div class="ol">${r}</div></div>`;
  });
  om.innerHTML = oh;
  ROOMS.forEach(r => {
    const c = document.querySelector(`.or[data-room="${r}"]`);
    const rd = devices.filter(d => d.room === r);
    const rn = document.createElement("div");
    rn.className = "rn";
    rn.textContent = short(r).toUpperCase();
    c.append(rn);
    rd.forEach(d => {
      const el = document.createElement("div");
      el.className = d.status === "on" ? (d.type === "light" ? "dd lo" : "dd fo") : "dd os";
      el.dataset.dot = d.id;
      el.textContent = d.type === "fan" ? "◆" : "●";
      c.append(el);
    });
  });
}

function buildCards(devices) {
  const rc = document.getElementById("rc");
  let rh = "";
  ROOMS.forEach(r => {
    rh += `<div class="rc g gi" data-room="${r}">
      <div class="rch"><span class="nm">${r}</span><span class="rpb" data-rp="${r}">0 W</span></div>
      <div class="dl" data-dl="${r}"></div>
      <div class="rf"><div class="rs" data-rs="${r}"></div></div>
    </div>`;
  });
  rc.innerHTML = rh;

  ROOMS.forEach(r => {
    const dl = document.querySelector(`[data-dl="${r}"]`);
    const rd = devices.filter(d => d.room === r);
    let x = "";
    rd.forEach(d => {
      const fan = d.type === "fan";
      const on = d.status === "on";
      const ic = `dic${on ? (fan ? " fo" : " lo") : ""}`;
      const spin = fan && on ? ' style="animation-play-state:running"' : ' style="animation-play-state:paused"';
      x += `<div class="di">
        <div class="${ic}" data-icon="${d.id}">${fan ? `<span class="fs"${spin}>◆</span>` : "●"}</div>
        <span class="dnn">${d.name}</span>
        <div class="switch-wrap">
          <div class="sw ${on ? "on" : ""}" data-sw="${d.id}">
            <div class="glow"></div>
            <div class="knob"></div>
          </div>
        </div>
      </div>`;
    });
    dl.innerHTML = x;
  });

  devices.forEach(d => {
    I[d.id] = document.querySelector(`[data-icon="${d.id}"]`);
    D[d.id] = document.querySelector(`[data-dot="${d.id}"]`);
    const sw = document.querySelector(`[data-sw="${d.id}"]`);
    if (sw) {
      SW[d.id] = sw;
      sw.addEventListener("click", e => {
        e.stopPropagation();
        toggleDevice(d.id);
      });
    }
  });

  ROOMS.forEach(r => {
    RB[r] = document.querySelector(`[data-rp="${r}"]`);
    const rs = document.querySelector(`[data-rs="${r}"]`);
    if (rs) {
      roomOnEl[r] = document.createElement("s");
      roomOnEl[r].innerHTML = '<span class="dot g"></span><span>0 ON</span>';
      roomOffEl[r] = document.createElement("s");
      roomOffEl[r].innerHTML = '<span class="dot r"></span><span>0 OFF</span>';
      rs.append(roomOnEl[r], roomOffEl[r]);
    }
  });
}

function buildBreakdown() {
  const bdc = document.getElementById("bdc");
  let bh = "";
  ROOMS.forEach(r => {
    bh += `<div class="br">
      <span class="bl">${short(r)}</span>
      <div class="bt"><div class="bf" style="width:0%" data-br="${r}"></div></div>
      <span class="bv" data-bv="${r}">0 W</span>
    </div>`;
  });
  bdc.innerHTML = bh;
  ROOMS.forEach(r => {
    BR[r] = document.querySelector(`[data-br="${r}"]`);
    BV[r] = document.querySelector(`[data-bv="${r}"]`);
  });
}

const BR = {}, BV = {};

function apply(devices) {
  devices.forEach(d => {
    const on = d.status === "on";

    const sw = SW[d.id];
    if (sw) sw.className = `sw ${on ? "on" : ""}`;

    const icon = I[d.id];
    if (icon) {
      if (d.type === "fan") {
        icon.className = `dic${on ? " fo" : ""}`;
        const s = icon.querySelector("span");
        if (s) s.style.animationPlayState = on ? "running" : "paused";
      } else {
        icon.className = `dic${on ? " lo" : ""}`;
      }
    }

    const dot = D[d.id];
    if (dot) dot.className = d.type === "light" && on ? "dd lo" : d.type === "fan" && on ? "dd fo" : "dd os";
  });

  ROOMS.forEach(r => {
    const rd = devices.filter(d => d.room === r);
    const rp = rd.reduce((s, d) => s + d.currentPower, 0);
    if (RB[r]) RB[r].textContent = rp + " W";
    const onCnt = rd.filter(d => d.status === "on").length;
    if (roomOnEl[r]) roomOnEl[r].querySelector("span:last-child").textContent = onCnt + " ON";
    if (roomOffEl[r]) roomOffEl[r].querySelector("span:last-child").textContent = (rd.length - onCnt) + " OFF";
  });

  const maxP = Math.max(1, ...ROOMS.map(r => devices.filter(d => d.room === r).reduce((s, d) => s + d.currentPower, 0)));
  ROOMS.forEach(r => {
    const rp = devices.filter(d => d.room === r).reduce((s, d) => s + d.currentPower, 0);
    const pct = maxP > 0 ? rp / maxP * 100 : 0;
    if (BR[r]) BR[r].style.width = pct + "%";
    if (BV[r]) BV[r].textContent = rp + " W";
  });

  const total = devices.reduce((s, d) => s + d.currentPower, 0);
  const ring = document.getElementById("pr");
  if (ring) ring.style.strokeDashoffset = 106.81 - (Math.min(total / 195, 1) * 106.81);
  document.getElementById("pv").textContent = total + " W";
  document.getElementById("lu").innerHTML = `Last updated: ${new Date().toLocaleTimeString()}`;
}

function renderAlerts(alerts) {
  const list = document.getElementById("al"), count = document.getElementById("ac");
  const active = alerts.filter(a => !a.resolved);
  count.textContent = active.length;
  if (!alerts || alerts.length === 0) {
    list.innerHTML = '<div class="ae">All clear</div>';
    return;
  }
  let h = "";
  alerts.forEach(a => {
    const cls = a.resolved ? "ai r" : "ai";
    const t = new Date(a.timestamp).toLocaleTimeString();
    const tag = a.type === "after-hours" ? "w" : "d";
    h += `<div class="${cls}"><div>${a.message} <span class="tg ${tag}">${a.type === "after-hours" ? "after-hours" : "long-on"}</span></div><div class="ti">${t}${a.resolved ? " · resolved" : ""}</div></div>`;
  });
  list.innerHTML = h;
}

socket.on("device_update", data => { apply(data); restore(); });
socket.on("usage_update", data => {
  if (data && data.estimatedKwhToday !== undefined) {
    document.getElementById("kd").textContent = data.estimatedKwhToday.toFixed(3) + " kWh";
    document.getElementById("kv").textContent = data.estimatedKwhToday.toFixed(3) + " kWh today";
  }
  restore();
});
socket.on("alerts_update", data => { renderAlerts(data || []); restore(); });
socket.on("new_alert", () => { fetch("/api/alerts").then(r => r.json()).then(d => { renderAlerts(d); restore(); }); });

fetch("/api/devices").then(r => r.json()).then(data => {
  buildMap(data);
  buildCards(data);
  buildBreakdown();
  apply(data);
  document.querySelectorAll(".rc, .fm").forEach(el => el.classList.add("show"));
});
fetch("/api/alerts").then(r => r.json()).then(d => renderAlerts(d));
</script>
</body>
</html>
